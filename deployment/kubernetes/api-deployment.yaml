apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-deployment-api
  labels:
    app: ai-deployment-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-deployment-api
  template:
    metadata:
      labels:
        app: ai-deployment-api
    spec:
      containers:
        - name: api
          image: ai-deployment-decision-engine:latest
          imagePullPolicy: IfNotPresent
          command: ["uvicorn"]
          args: ["api.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "2Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: ai-deployment-api-service
spec:
  type: ClusterIP
  selector:
    app: ai-deployment-api
  ports:
    - port: 8000
      targetPort: 8000
